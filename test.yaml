esphome:
  name: digit-test
  platform: ESP32
  board: esp32cam

external_components:
  - source:
      type: local
      path: .
    components: [digit_number]

esp32_camera:
  id: my_camera
  external_clock:
    pin: GPIO0
    frequency: 20MHz
  i2c_pins:
    sda: GPIO26
    scl: GPIO27
  data_pins: [GPIO5, GPIO18, GPIO19, GPIO21, GPIO36, GPIO39, GPIO34, GPIO35]
  vsync_pin: GPIO25
  href_pin: GPIO23
  pixel_clock_pin: GPIO22
  pixel_format: GRAYSCALE
  resolution: SVGA

sensor:
  - platform: digit_number
    name: "Distance"
    camera_id: my_camera
    update_interval: 2s
    sample_radius: 4
    threshold: auto
    display_off_threshold: 20
    digits:
      # Calibrated for test_cases/size_2 (640x480 close-up, lower display row)
      # Adjust these for your specific camera position and display framing.
      - a: [105, 143]
        g: [105, 249]
        b: 140
      - a: [230, 143]
        g: [230, 249]
        b: 265
      - a: [362, 143]
        g: [362, 249]
        b: 398
      - a: [485, 143]
        g: [485, 249]
        b: 515
